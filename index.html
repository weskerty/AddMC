<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Casita Server</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,sans-serif;padding:20px;background:#0d0f12 url('wallpaper.avif') center/cover no-repeat}
.mc-card{max-width:380px;width:100%;background:rgba(255,255,255,.12);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.25);border-radius:16px;overflow:hidden}
.mc-head{padding:18px 20px 14px;display:flex;gap:12px;align-items:flex-start}
.mc-thumb{width:48px;height:48px;border-radius:10px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.08) url('servericon.avif') center/cover no-repeat}
.mc-hinfo{flex:1;min-width:0}
.mc-name{font-size:1.1em;font-weight:700;color:#fff;margin:0 0 4px}
.mc-desc{font-size:.85em;color:rgba(255,255,255,.5);margin:0 0 10px;line-height:1.45}
.mc-addr{font-size:.78em;color:rgba(255,255,255,.35);font-family:monospace;background:rgba(255,255,255,.05);display:inline-block;padding:3px 8px;border-radius:7px;margin-bottom:14px}
.mc-acts{display:flex;gap:6px;flex-wrap:wrap}
.mc-bbtn{display:inline-flex;align-items:center;gap:6px;padding:9px 15px;border-radius:12px;font-size:.85em;font-weight:600;text-decoration:none;cursor:pointer;border:1px solid rgba(98,210,88,.3);background:rgba(98,210,88,.08);color:#7ee87a;transition:background .18s,transform .15s;width:100%;justify-content:center}
.mc-bbtn:hover{background:rgba(98,210,88,.16);transform:translateY(-1px)}
.mc-note{padding:10px 20px 16px;border-top:1px solid rgba(255,255,255,.06);font-size:.78em;color:rgba(255,255,255,.4);line-height:1.5}
</style>
</head>
<body>

<div class="mc-card">
  <div class="mc-head">
    <div class="mc-thumb"></div>
    <div class="mc-hinfo">
      <div class="mc-name">Casita Server</div>
      <div class="mc-desc">Servidor Minecraft Bedrock</div>
      <div class="mc-addr">mc.cheagana.com:19132</div>
      <div class="mc-acts">
        <a class="mc-bbtn" id="BS_FW1" href="#">Unite al Servidor</a>
      </div>
    </div>
  </div>
  <div class="mc-note">presiona el boton de arriba para anadir el server ⬆</div>
</div>

<script>
const SN1='Casita Server';
const SU1='mc.cheagana.com';
const SP1='19132';
const URI1=`minecraft:?addExternalServer=${encodeURIComponent(SN1)}|${SU1}:${SP1}`;
document.getElementById('BS_FW1').href=URI1;
window.location.href=URI1;
</script>

</body>
</html>
